name: App Store Upload HomeDesignerSuite

on:
  workflow_dispatch:
    inputs:
      app_version:
        description: 'App version (must match App Store Connect)'
        required: true
        default: '1.0.0'

permissions:
  contents: write

jobs:
  upload:
    runs-on: macos-latest
    environment: HomeDesignerSuite

    steps:

    - name: Checkout repo
      run: |
        GIT_LFS_SKIP_SMUDGE=1 git clone --filter=blob:none \
          https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git .
        git lfs install
        git lfs pull --include="build/HomeDesignerSuite.app/**"

    - name: Install App Distribution certificate
      run: |
        echo "${{ secrets.MAC_APP_DIST_CERTIFICATE }}" | base64 --decode > app_cert.p12

        security create-keychain -p actions build.keychain
        security default-keychain -s build.keychain
        security unlock-keychain -p actions build.keychain

        security import app_cert.p12 \
          -k build.keychain \
          -P "${{ secrets.MAC_APP_DIST_CERTIFICATE_PWD }}" \
          -T /usr/bin/codesign \
          -T /usr/bin/productbuild

        security set-key-partition-list -S apple-tool:,apple: \
          -s -k actions build.keychain

    - name: Install Installer certificate
      run: |
        echo "${{ secrets.MAC_INSTALLER_CERTIFICATE }}" | base64 --decode > installer_cert.p12

        security import installer_cert.p12 \
          -k build.keychain \
          -P "${{ secrets.MAC_INSTALLER_CERTIFICATE_PWD }}" \
          -T /usr/bin/productbuild

        security set-key-partition-list -S apple-tool:,apple: \
          -s -k actions build.keychain

    - name: Verify signing identities
      run: security find-identity -v -p codesigning

    - name: Install provisioning profile
      run: |
        echo "${{ secrets.PROVISIONING_PROFILE }}" | base64 --decode > profile.provisionprofile
        mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
        PROFILE_UUID=$(/usr/libexec/PlistBuddy -c "Print UUID" /dev/stdin <<< \
          $(security cms -D -i profile.provisionprofile))
        cp profile.provisionprofile \
          ~/Library/MobileDevice/Provisioning\ Profiles/"$PROFILE_UUID".provisionprofile

    - name: Setup API key
      run: |
        mkdir -p private_keys
        echo "${{ secrets.APPLE_API_KEY }}" > private_keys/AuthKey_${{ secrets.APPLE_KEY_ID }}.p8

    - name: Fix executable permissions
      run: |
        # Git on Windows stores all files as 644 — restore +x on Mach-O binaries
        APP="build/HomeDesignerSuite.app"
        find "$APP" -type f \( -name "*.dylib" -o -name "*.so" -o -name "*.bundle" \) -exec chmod +x {} \;
        find "$APP" -type f -path "*/MacOS/*" -exec chmod +x {} \;
        chmod +x "$APP/Contents/MacOS/Home Designer Suite"

    - name: Extract and fix entitlements from provisioning profile
      run: |
        # Decode the provisioning profile XML
        security cms -D -i profile.provisionprofile > profile_decoded.plist
        # Extract the Entitlements dict into its own plist
        /usr/libexec/PlistBuddy -x -c "Print :Entitlements" profile_decoded.plist > entitlements.plist

        # Fix application-identifier: replace wildcard with actual Team ID + bundle ID
        BUNDLE_ID=$(/usr/libexec/PlistBuddy -c "Print :CFBundleIdentifier" \
          build/HomeDesignerSuite.app/Contents/Info.plist)
        /usr/libexec/PlistBuddy -c "Set :com.apple.application-identifier ${{ secrets.APPLE_TEAM_ID }}.${BUNDLE_ID}" \
          entitlements.plist

        # Ensure app-sandbox is enabled (required for Mac App Store)
        /usr/libexec/PlistBuddy -c "Add :com.apple.security.app-sandbox bool true" entitlements.plist 2>/dev/null \
          || /usr/libexec/PlistBuddy -c "Set :com.apple.security.app-sandbox true" entitlements.plist

        # Entitlements required by Unity Mono runtime and app features
        for ENT in \
          "com.apple.security.device.audio-input" \
          "com.apple.security.cs.allow-jit" \
          "com.apple.security.cs.allow-unsigned-executable-memory" \
          "com.apple.security.cs.disable-library-validation"; do
          /usr/libexec/PlistBuddy -c "Set :$ENT true" entitlements.plist 2>/dev/null \
            || /usr/libexec/PlistBuddy -c "Add :$ENT bool true" entitlements.plist
        done

        echo "=== Entitlements ==="
        cat entitlements.plist

    - name: Patch Info.plist version
      run: |
        PLIST="build/HomeDesignerSuite.app/Contents/Info.plist"
        /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString ${{ inputs.app_version }}" "$PLIST"
        /usr/libexec/PlistBuddy -c "Set :CFBundleVersion ${{ github.run_number }}" "$PLIST"
        echo "Set version to ${{ inputs.app_version }} (build ${{ github.run_number }})"

    - name: Embed provisioning profile
      run: |
        cp profile.provisionprofile build/HomeDesignerSuite.app/Contents/embedded.provisionprofile
        echo "Embedded provisioning profile into app bundle"

    - name: Codesign app bundle
      env:
        SIGN_ID: "Apple Distribution: exoa interactive (${{ secrets.APPLE_TEAM_ID }})"
      run: |
        APP="build/HomeDesignerSuite.app"

        # Sign all Mach-O binaries (dylibs, so, flat-file bundles)
        find "$APP" -type f \( -name "*.dylib" -o -name "*.so" -o -name "*.bundle" \) -exec \
          codesign --force --timestamp --options runtime \
            --entitlements entitlements.plist \
            --sign "$SIGN_ID" {} \;

        # Sign any other Mach-O executables
        find "$APP" -type f -perm +111 -exec \
          sh -c 'file "$1" | grep -q Mach-O && codesign --force --timestamp --options runtime \
            --entitlements entitlements.plist \
            --sign "$2" "$1"' _ {} "$SIGN_ID" \;

        # Sign directory bundles and frameworks (deepest first)
        find "$APP" -depth -type d \( -name "*.bundle" -o -name "*.framework" \) -exec \
          codesign --force --timestamp --options runtime \
            --entitlements entitlements.plist \
            --sign "$SIGN_ID" {} \;

        # Sign the main app bundle last
        codesign --force --timestamp --options runtime \
          --entitlements entitlements.plist \
          --sign "$SIGN_ID" "$APP"

    - name: Verify codesign
      run: |
        codesign --verify --deep --strict --verbose=2 build/HomeDesignerSuite.app

    - name: Build pkg for App Store
      run: |
        productbuild --component build/HomeDesignerSuite.app /Applications \
          --sign "3rd Party Mac Developer Installer: exoa interactive (${{ secrets.APPLE_TEAM_ID }})" \
          build/HomeDesignerSuite.pkg

    - name: Debug pkg metadata
      run: |
        echo "=== Info.plist contents ==="
        /usr/libexec/PlistBuddy -c "Print :CFBundleIdentifier" build/HomeDesignerSuite.app/Contents/Info.plist
        /usr/libexec/PlistBuddy -c "Print :CFBundleShortVersionString" build/HomeDesignerSuite.app/Contents/Info.plist
        /usr/libexec/PlistBuddy -c "Print :CFBundleVersion" build/HomeDesignerSuite.app/Contents/Info.plist
        echo "=== pkg info ==="
        pkgutil --payload-files build/HomeDesignerSuite.pkg | head -5

    - name: Validate with App Store
      run: |
        xcrun altool --validate-app \
          --file build/HomeDesignerSuite.pkg \
          --type osx \
          --apiKey ${{ secrets.APPLE_KEY_ID }} \
          --apiIssuer ${{ secrets.APPLE_ISSUER_ID }}

    - name: Upload to App Store Connect
      run: |
        xcrun altool --upload-app \
          --file build/HomeDesignerSuite.pkg \
          --type osx \
          --apiKey ${{ secrets.APPLE_KEY_ID }} \
          --apiIssuer ${{ secrets.APPLE_ISSUER_ID }}

    - name: Create GitHub Release
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        TAG="HomeDesignerSuite-appstore-$(date +%Y%m%d)-run${{ github.run_number }}"
        gh release create "$TAG" \
          build/HomeDesignerSuite.pkg \
          --title "HomeDesignerSuite App Store pkg ($(date +%Y-%m-%d) #${{ github.run_number }})" \
          --notes "App Store signed pkg for HomeDesignerSuite.

        Workflow run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
